services:
  node:
    image: node:24
    user: node
    working_dir: /home/node/app
    environment:
      - NODE_ENV=production
    volumes:
      - /mnt/nas_pool/nodejs/web_prod_nodejs:/home/node/app
    ports:
      # use if it is necessary to expose the container to the host machine
      - 8888:8888
    command:
      - npm
      - start
